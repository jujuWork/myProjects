<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <h2>実際に納屋橋キックでレッスンに励むお客様からの声をいただきました。</h2>
        <!-- FIRST CONTAINER -->
        <section class="voice__container">
            <div class="voice__item">
                <img src="./img/img01.webp" alt="img01" class="voice__img">
                <img src="./img/img01_sp.webp" alt="img01--sp" class="voice__img--sp">
            </div>
            <div class="voice__item">
                <h3>工藤さん</h3>
                <img src="./img/img_name_line.webp" alt="line" class="name__line">
                <p class="voice__text">
                    フィットネスとしても最高、キックボクシングも最高。
                    とにかくムエタイもできる。そんなジムです！
                </p>
            </div>
        </section>

        <!-- SECOND CONTAINER -->
        <section class="voice__container">
            <div class="voice__item">
                <img src="./img/img02.webp" alt="img02" class="voice__img">
                <img src="./img/img02_sp.webp" alt="img02--sp" class="voice__img--sp">
            </div>
            <div class="voice__item">
                <h3>杉ちゃん</h3>
                <img src="./img/img_name_line.webp" alt="line" class="name__line">
                <p class="voice__text">
                    会費が安くて通いやすいジムです。
                    フィットネスクラスは女性でも通いやすいと思います。
                    ハードル高そうだけど初心者でも行きやすいジムです！
                </p>
            </div>
        </section>

        <!-- THIRD CONTAINER -->
        <section class="voice__container">
            <div class="voice__item">
                <img src="./img/img03.webp" alt="img03" class="voice__img">
                <img src="./img/img03_sp.webp" alt="img03--sp" class="voice__img--sp">
            </div>
            <div class="voice__item">
                <h3>足立さん</h3>
                <img src="./img/img_name_line.webp" alt="line" class="name__line">
                <p class="voice__text">
                    おじさんでも楽しめるジムです！待ってます！
                </p>
            </div>
        </section>

        <!-- FOURTH CONTAINER -->
        <section class="voice__container">
            <div class="voice__item">
                <img src="./img/img04.webp" alt="img04" class="voice__img">
                <img src="./img/img04_sp.webp" alt="img04--sp" class="voice__img--sp">
            </div>
            <div class="voice__item">
                <h3>三浦さん</h3>
                <img src="./img/img_name_line.webp" alt="line" class="name__line">
                <p class="voice__text">
                    納屋橋キックはみなさんがフレンドリーでトレーナーの
                    方から丁寧に教えてもらえるとてもいいジムです。
                    ぜひキックボクシングをやりたい方はぜひ来てください！
                </p>
            </div>
        </section>
    </main>

</body>

</html>
